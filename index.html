<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>Склад</title>
  <style>
    :root{
      --bg:#0f172a; --bg2:#111827; --card:#1e293b; --line:#334155;
      --text:#e5e7eb; --muted:#94a3b8; --accent:#3b82f6;
      --ok:#14532d; --warn:#854d0e; --buy:#7f1d1d; --none:#450a0a;
    }
    *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
    html,body{
      margin:0; padding:0; width:100%; height:100%;
      overflow:hidden; background:var(--bg); color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    }
    body{position:fixed; inset:0;}
    .app{
      height:100%; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch;
      padding:
        calc(env(safe-area-inset-top, 0px) + 12px)
        max(12px, env(safe-area-inset-right, 0px))
        calc(env(safe-area-inset-bottom, 0px) + 18px)
        max(12px, env(safe-area-inset-left, 0px));
      background:linear-gradient(180deg,#0b1220 0%, #111827 100%);
    }
    .panel{
      background:rgba(30,41,59,.9); border:1px solid var(--line);
      border-radius:18px; padding:14px; margin-bottom:12px;
      box-shadow:0 8px 24px rgba(0,0,0,.25);
    }
    .panel h2{margin:0 0 12px; font-size:17px;}
    .grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
    .full{grid-column:1/-1;}
    label{display:block; font-size:12px; color:var(--muted); margin-bottom:6px;}
    input, select, textarea{
      width:100%; border-radius:12px; border:1px solid #475569;
      background:#0f172a; color:var(--text); padding:12px; font-size:16px; outline:none;
    }
    textarea{resize:vertical; min-height:78px;}
    .row{display:flex; gap:8px; flex-wrap:wrap;}
    button{
      border:0; border-radius:12px; padding:12px 14px; font-size:15px; font-weight:700;
      background:var(--accent); color:white; cursor:pointer;
    }
    button.secondary{background:#334155;}
    button.ghost{background:transparent; border:1px solid #475569; color:var(--text);}
    button.danger{background:#991b1b;}
    .stats{display:grid; grid-template-columns:repeat(4,1fr); gap:8px;}
    .stat{background:#0f172a; border:1px solid var(--line); border-radius:14px; padding:10px;}
    .stat .n{font-size:22px; font-weight:800;}
    .stat .t{font-size:12px; color:var(--muted);}
    .tabs-wrap,.subtabs-wrap{display:flex; gap:8px; align-items:center; margin-bottom:10px;}
    .tabs,.subtabs{display:flex; gap:8px; overflow:auto; padding-bottom:2px; flex:1;}
    .tab,.subtab{
      white-space:nowrap; background:#0f172a; border:1px solid #475569;
      color:var(--text); border-radius:12px; padding:10px 12px; font-size:14px; font-weight:700;
    }
    .tab.active,.subtab.active{background:var(--accent); border-color:var(--accent);}

    .subtab[draggable="true"]{cursor:grab;}
    .subtab.dragging{opacity:.45;}
    .subtab.drag-over{outline:2px dashed #60a5fa; outline-offset:2px;}

    .item{
      border:1px solid var(--line); border-radius:16px; background:#0f172a;
      padding:12px; margin-bottom:10px;
    }
    .item[draggable="true"]{cursor:grab;}
    .item.dragging{opacity:.45;}
    .item.drag-over{outline:2px dashed #60a5fa; outline-offset:2px;}
    .item-top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:8px;}
    .name{font-size:17px; font-weight:800; line-height:1.2;}
    .cat{font-size:12px; color:var(--muted); margin-top:4px;}
    .badge{
      padding:6px 8px; border-radius:999px; font-size:11px; font-weight:800; flex:0 0 auto;
      border:1px solid rgba(255,255,255,.08);
    }
    .ok{background:var(--ok);} .warn{background:var(--warn);} .buy{background:var(--buy);} .none{background:var(--none);}
    .meta{font-size:13px; color:var(--muted); display:grid; gap:4px; margin-bottom:10px;}
    .actions{display:grid; grid-template-columns:44px 1fr 44px 84px; gap:8px; align-items:center;}
    .qty{
      width:100%; text-align:center; font-size:16px; font-weight:800; padding:10px; border-radius:12px;
      border:1px solid var(--line); background:#111827; color:var(--text);
    }
    .qty-input{appearance:textfield; -moz-appearance:textfield;}
    .qty-input::-webkit-outer-spin-button,.qty-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
    .empty{
      padding:16px; text-align:center; color:var(--muted); border:1px dashed #475569; border-radius:16px;
      background:#0f172a;
    }
    .shopping-group{
      border:1px solid var(--line); border-radius:14px; background:#0f172a; margin-bottom:10px; overflow:hidden;
    }
    .shopping-group-head{
      padding:12px 12px 8px; border-bottom:1px solid rgba(148,163,184,.14); font-weight:800; font-size:15px;
    }
    .shopping-item{
      display:grid; grid-template-columns:1.4fr 110px 110px auto; gap:8px; align-items:start;
      padding:10px 12px; border-bottom:1px solid rgba(148,163,184,.12);
    }
    .shopping-item:last-child{border-bottom:0;}
    .shopping-meta{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.35;}
    .shop-field input,.shop-field select{padding:10px;font-size:14px;min-height:42px;}
    .shop-name{font-weight:700;}
    .modal{
      position:fixed; inset:0; z-index:1200; display:none; align-items:flex-end; justify-content:center;
      background:rgba(2,6,23,.62); padding:16px;
    }
    .modal.show{display:flex;}
    .modal-card{
      width:min(760px,100%); max-height:92dvh; overflow:auto; background:#0f172a; border:1px solid var(--line);
      border-radius:18px; padding:14px; box-shadow:0 12px 36px rgba(0,0,0,.35);
    }
    .modal-head{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:12px;}
    .print-overlay{
      position:fixed; inset:0; z-index:999; background:#ffffff; color:#111827;
      display:none; overflow:auto; min-height:100dvh; height:100dvh; width:100%;
      padding:
        calc(env(safe-area-inset-top, 0px) + 12px)
        max(12px, env(safe-area-inset-right, 0px))
        calc(env(safe-area-inset-bottom, 0px) + 12px)
        max(12px, env(safe-area-inset-left, 0px));
    }
    .print-overlay.show{display:block;}
    .print-bar{
      position:sticky; top:0; z-index:2; display:flex; gap:8px; flex-wrap:wrap;
      padding:0 0 12px; background:#ffffff; border-bottom:1px solid #cbd5e1; margin-bottom:12px;
    }
    .print-doc{
      max-width:900px; margin:0 auto; background:#ffffff; border:1px solid #cbd5e1; border-radius:16px;
      padding:18px; min-height:calc(100dvh - 90px);
    }
    .print-doc h1{margin:0 0 6px; font-size:24px; color:#111827;}
    .print-doc .muted{color:#475569; margin-bottom:18px; font-size:12px;}
    .print-section{margin-bottom:22px;}
    .print-section h2{
      margin:0 0 10px; font-size:18px; color:#111827; border-bottom:1px solid #cbd5e1; padding-bottom:6px;
    }
    .print-table{width:100%; border-collapse:collapse; font-size:12px;}
    .print-table th,.print-table td{text-align:left; border:1px solid #cbd5e1; padding:8px; color:#111827;}
    
    .tree-list{display:grid; gap:10px;}
    .tree-category{
      border:1px solid var(--line); border-radius:14px; background:#0f172a; padding:12px;
    }
    .tree-head{
      display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom:10px; flex-wrap:wrap;
    }
    .tree-name{font-weight:800; font-size:16px;}
    .tree-subs{display:grid; gap:8px; margin-top:8px;}
    .tree-sub{
      display:flex; justify-content:space-between; align-items:center; gap:8px; padding:10px 12px;
      border:1px solid #475569; border-radius:12px; background:#111827; flex-wrap:wrap;
    }
    .tree-empty{color:var(--muted); font-size:13px;}

    
    .stat.clickable{cursor:pointer; transition:transform .12s ease, border-color .12s ease;}
    .stat.clickable:hover{transform:translateY(-1px); border-color:#60a5fa;}
    .quick-list{display:grid; gap:8px;}
    .quick-row{
      display:flex; justify-content:space-between; align-items:center; gap:8px; flex-wrap:wrap;
      padding:10px 12px; border:1px solid #475569; border-radius:12px; background:#111827;
    }
    .quick-title{font-weight:700;}
    .quick-meta{font-size:12px; color:var(--muted); margin-top:4px;}

    @media (max-width:720px){
      .grid,.stats,.shopping-item{grid-template-columns:1fr;}
      .actions{grid-template-columns:50px 1fr 50px 84px;}
      button{min-height:46px;}
      .print-overlay{padding:0;background:#ffffff;}
      .print-bar{
        padding:
          calc(env(safe-area-inset-top, 0px) + 10px)
          max(12px, env(safe-area-inset-right, 0px))
          10px
          max(12px, env(safe-area-inset-left, 0px));
        margin-bottom:0;
      }
      .print-doc{min-height:calc(100dvh - 70px);max-width:none;border:0;border-radius:0;padding:16px 12px calc(env(safe-area-inset-bottom, 0px) + 16px);}
    }
    @media print{
      body > .app{display:none !important;}
      .print-overlay{display:block !important; position:static; inset:auto; padding:0; background:white;}
      .print-bar{display:none !important;}
      .print-doc{max-width:none; margin:0; border:0; border-radius:0; padding:0;}
    }
  </style>
</head>
<body>
  <div class="app">

    <section class="panel">
      <h2>Добавить позицию</h2>
      <div class="grid">
        <div>
          <label for="category">Категория</label>
          <input id="category" list="categoryList" placeholder="Например: Кабеля" />
          <datalist id="categoryList"></datalist>
        </div>
        <div>
          <label for="subcategory">Подкатегория</label>
          <input id="subcategory" list="subcategoryList" placeholder="Например: 0.75 кв" />
          <datalist id="subcategoryList"></datalist>
        </div>
        <div>
          <label for="name">Наименование</label>
          <input id="name" placeholder="Например: 4x1.5" />
        </div>
        <div>
          <label for="unit">Ед. изм.</label>
          <select id="unit">
            <option value="шт">шт</option>
            <option value="м">м</option>
            <option value="уп">уп</option>
            <option value="компл">компл</option>
          </select>
        </div>
        <div>
          <label for="qty">Остаток</label>
          <input id="qty" type="number" min="0" step="1" placeholder="0" />
        </div>
        <div>
          <label for="minQty">Мин. остаток</label>
          <input id="minQty" type="number" min="0" step="1" placeholder="0" />
        </div>
        <div>
          <label for="location">Где лежит</label>
          <input id="location" placeholder="Например: Ящик 2" />
        </div>
        <div class="full">
          <label for="note">Примечание</label>
          <textarea id="note" placeholder="Цвет, размер, комментарий"></textarea>
        </div>
      </div>
      <div class="row" style="margin-top:12px;">
        <button class="secondary" id="createCategoryBtn">Создать категорию</button>
        <button class="secondary" id="createSubcategoryBtn">Создать подкатегорию</button>
        <button id="addBtn">Добавить позицию</button>
        <button class="secondary" id="addDemoBtn">Заполнить примером</button>
        <button class="ghost" id="exportJsonBtn">Экспорт JSON</button>
        <label class="ghost" style="display:flex;align-items:center;justify-content:center;padding:12px 14px;border-radius:12px;cursor:pointer;">
          Импорт JSON
          <input id="importFile" type="file" accept=".json" style="display:none;" />
        </label>
      </div>
    </section>

    <section class="panel">
      <div class="stats">
        <div class="stat clickable" id="statCategoriesCard"><div class="n" id="statCategories">0</div><div class="t">Категорий</div></div>
        <div class="stat clickable" id="statItemsCard"><div class="n" id="statItems">0</div><div class="t">Позиций</div></div>
        <div class="stat clickable" id="statWarnCard"><div class="n" id="statWarn">0</div><div class="t">Мало</div></div>
        <div class="stat clickable" id="statNeedBuyCard"><div class="n" id="statNeedBuy">0</div><div class="t">Купить</div></div>
      </div>
    </section>

    <section class="panel">
      <h2>Склад</h2>
      <div class="tabs-wrap">
        <div class="tabs" id="tabs"></div>
        <button class="secondary" id="openStructureBtn">Структура</button>
        <button class="danger" id="deleteCategoryBtn" style="display:none;">Удалить категорию</button>
      </div>
      <div class="subtabs-wrap">
        <div class="subtabs" id="subtabs"></div>
        <button class="secondary" id="manageSubcategoryBtn" style="display:none;">Управлять подкатегорией</button>
      </div>
      <div class="row" style="margin:12px 0;">
        <input id="search" placeholder="Поиск по названию / месту / примечанию" />
        <button class="ghost" id="exportStockExcelBtn">Экспорт склада в XLSX</button>
      </div>
      <div id="items"></div>
    </section>

    <section class="panel">
      <h2>Список закупки</h2>
      <div class="row" style="margin-bottom:12px;">
        <button id="fillShoppingBtn">Добавить всё проблемное</button>
        <button class="secondary" id="clearShoppingBtn">Очистить список</button>
        <button class="ghost" id="pdfShoppingBtn">Скачать PDF</button>
        <button class="ghost" id="exportShoppingExcelBtn">Экспорт закупки в XLSX</button>
      </div>
      <div id="shopping"></div>
    </section>
  </div>



  <div class="modal" id="quickModal">
    <div class="modal-card">
      <div class="modal-head">
        <h2 style="margin:0;font-size:18px;" id="quickModalTitle">Быстрый доступ</h2>
        <button class="secondary" id="closeQuickBtn">Закрыть</button>
      </div>
      <div class="row" id="quickModalActions" style="margin-bottom:12px;"></div>
      <div class="quick-list" id="quickModalList"></div>
    </div>
  </div>

  <div class="modal" id="structureModal">
    <div class="modal-card">
      <div class="modal-head">
        <h2 style="margin:0;font-size:18px;">Управление структурой склада</h2>
        <button class="secondary" id="closeStructureBtn">Закрыть</button>
      </div>

      <div class="grid" style="margin-bottom:12px;">
        <div>
          <label for="managerCategoryInput">Новая категория</label>
          <input id="managerCategoryInput" placeholder="Например: Кабеля" />
        </div>
        <div class="row" style="align-items:end;">
          <button id="managerAddCategoryBtn">Добавить категорию</button>
        </div>
      </div>

      <div class="grid" style="margin-bottom:12px;">
        <div>
          <label for="managerParentCategory">Категория для подкатегории</label>
          <select id="managerParentCategory"></select>
        </div>
        <div>
          <label for="managerSubcategoryInput">Новая подкатегория</label>
          <input id="managerSubcategoryInput" placeholder="Например: 0.75 кв" />
        </div>
        <div class="full row">
          <button id="managerAddSubcategoryBtn">Добавить подкатегорию</button>
        </div>
      </div>

      <div class="tree-list" id="structureTree"></div>
    </div>
  </div>

  <div class="modal" id="subcategoryModal">
    <div class="modal-card">
      <div class="modal-head">
        <h2 style="margin:0;font-size:18px;">Подкатегория</h2>
        <button class="secondary" id="closeSubcategoryBtn">Закрыть</button>
      </div>
      <div class="grid">
        <div class="full">
          <label for="renameSubcategoryInput">Новое имя подкатегории</label>
          <input id="renameSubcategoryInput" placeholder="Например: 1.5 кв" />
        </div>
      </div>
      <div class="row" style="margin-top:12px;">
        <button id="saveSubcategoryBtn">Сохранить</button>
        <button class="danger" id="deleteSubcategoryBtn">Удалить подкатегорию</button>
      </div>
    </div>
  </div>

  <div class="modal" id="editModal">
    <div class="modal-card">
      <div class="modal-head">
        <h2 style="margin:0;font-size:18px;">Редактировать позицию</h2>
        <button class="secondary" id="closeEditBtn">Закрыть</button>
      </div>

      <div class="grid">
        <div>
          <label for="editCategory">Категория</label>
          <input id="editCategory" list="editCategoryList" placeholder="Категория" />
          <datalist id="editCategoryList"></datalist>
        </div>
        <div>
          <label for="editSubcategory">Подкатегория</label>
          <input id="editSubcategory" list="editSubcategoryList" placeholder="Подкатегория" />
          <datalist id="editSubcategoryList"></datalist>
        </div>
        <div>
          <label for="editName">Наименование</label>
          <input id="editName" placeholder="Наименование" />
        </div>
        <div>
          <label for="editUnit">Ед. изм.</label>
          <select id="editUnit">
            <option value="шт">шт</option>
            <option value="м">м</option>
            <option value="уп">уп</option>
            <option value="компл">компл</option>
          </select>
        </div>
        <div>
          <label for="editQty">Остаток</label>
          <input id="editQty" type="number" min="0" step="1" />
        </div>
        <div>
          <label for="editMinQty">Мин. остаток</label>
          <input id="editMinQty" type="number" min="0" step="1" />
        </div>
        <div>
          <label for="editLocation">Где лежит</label>
          <input id="editLocation" placeholder="Место хранения" />
        </div>
        <div class="full">
          <label for="editNote">Примечание</label>
          <textarea id="editNote" placeholder="Примечание"></textarea>
        </div>
      </div>

      <div class="row" style="margin-top:12px;">
        <button id="saveEditBtn">Сохранить</button>
        <button class="danger" id="deleteFromEditBtn">Удалить</button>
      </div>
    </div>
  </div>

  <div class="print-overlay" id="printOverlay">
    <div class="print-bar">
      <button class="secondary" id="closePrintBtn">Назад</button>
      <button id="confirmPrintBtn">Печать / PDF</button>
    </div>
    <div class="print-doc" id="printContent"></div>
  </div>

  <script type="text/javascript" src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script>
    const STORAGE_KEY = 'warehouse-rebuilt-v4';

    const els = {
      category: document.getElementById('category'),
      subcategory: document.getElementById('subcategory'),
      categoryList: document.getElementById('categoryList'),
      subcategoryList: document.getElementById('subcategoryList'),
      name: document.getElementById('name'),
      unit: document.getElementById('unit'),
      qty: document.getElementById('qty'),
      minQty: document.getElementById('minQty'),
      location: document.getElementById('location'),
      note: document.getElementById('note'),
      createCategoryBtn: document.getElementById('createCategoryBtn'),
      createSubcategoryBtn: document.getElementById('createSubcategoryBtn'),
      addBtn: document.getElementById('addBtn'),
      addDemoBtn: document.getElementById('addDemoBtn'),
      exportJsonBtn: document.getElementById('exportJsonBtn'),
      importFile: document.getElementById('importFile'),
      statItems: document.getElementById('statItems'),
      statCategories: document.getElementById('statCategories'),
      statWarn: document.getElementById('statWarn'),
      statItemsCard: document.getElementById('statItemsCard'),
      statCategoriesCard: document.getElementById('statCategoriesCard'),
      statNeedBuyCard: document.getElementById('statNeedBuyCard'),
      statWarnCard: document.getElementById('statWarnCard'),
      statNeedBuy: document.getElementById('statNeedBuy'),
      statZero: document.getElementById('statZero'),
      tabs: document.getElementById('tabs'),
      subtabs: document.getElementById('subtabs'),
      openStructureBtn: document.getElementById('openStructureBtn'),
      deleteCategoryBtn: document.getElementById('deleteCategoryBtn'),
      manageSubcategoryBtn: document.getElementById('manageSubcategoryBtn'),
      search: document.getElementById('search'),
      exportStockExcelBtn: document.getElementById('exportStockExcelBtn'),
      items: document.getElementById('items'),
      shopping: document.getElementById('shopping'),
      fillShoppingBtn: document.getElementById('fillShoppingBtn'),
      clearShoppingBtn: document.getElementById('clearShoppingBtn'),
      pdfShoppingBtn: document.getElementById('pdfShoppingBtn'),
      exportShoppingExcelBtn: document.getElementById('exportShoppingExcelBtn'),
      quickModal: document.getElementById('quickModal'),
      quickModalTitle: document.getElementById('quickModalTitle'),
      quickModalActions: document.getElementById('quickModalActions'),
      quickModalList: document.getElementById('quickModalList'),
      closeQuickBtn: document.getElementById('closeQuickBtn'),
      structureModal: document.getElementById('structureModal'),
      closeStructureBtn: document.getElementById('closeStructureBtn'),
      managerCategoryInput: document.getElementById('managerCategoryInput'),
      managerAddCategoryBtn: document.getElementById('managerAddCategoryBtn'),
      managerParentCategory: document.getElementById('managerParentCategory'),
      managerSubcategoryInput: document.getElementById('managerSubcategoryInput'),
      managerAddSubcategoryBtn: document.getElementById('managerAddSubcategoryBtn'),
      structureTree: document.getElementById('structureTree'),
      subcategoryModal: document.getElementById('subcategoryModal'),
      closeSubcategoryBtn: document.getElementById('closeSubcategoryBtn'),
      renameSubcategoryInput: document.getElementById('renameSubcategoryInput'),
      saveSubcategoryBtn: document.getElementById('saveSubcategoryBtn'),
      deleteSubcategoryBtn: document.getElementById('deleteSubcategoryBtn'),
      editModal: document.getElementById('editModal'),
      closeEditBtn: document.getElementById('closeEditBtn'),
      saveEditBtn: document.getElementById('saveEditBtn'),
      deleteFromEditBtn: document.getElementById('deleteFromEditBtn'),
      editCategory: document.getElementById('editCategory'),
      editSubcategory: document.getElementById('editSubcategory'),
      editCategoryList: document.getElementById('editCategoryList'),
      editSubcategoryList: document.getElementById('editSubcategoryList'),
      editName: document.getElementById('editName'),
      editUnit: document.getElementById('editUnit'),
      editQty: document.getElementById('editQty'),
      editMinQty: document.getElementById('editMinQty'),
      editLocation: document.getElementById('editLocation'),
      editNote: document.getElementById('editNote'),
      printOverlay: document.getElementById('printOverlay'),
      printContent: document.getElementById('printContent'),
      closePrintBtn: document.getElementById('closePrintBtn'),
      confirmPrintBtn: document.getElementById('confirmPrintBtn'),
    };

    const app = {
      activeCategory: 'all',
      activeSubcategory: 'all',
      editingId: null,
      state: loadState(),
    };

    function uid() {
      return Math.random().toString(36).slice(2, 10);
    }

    function normalize(value) {
      return String(value || '').trim().replace(/\s+/g, ' ');
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return { items: [], shopping: [], taxonomy: [] };
        const parsed = JSON.parse(raw);
        const items = Array.isArray(parsed.items) ? parsed.items.map(x => ({ ...x, subcategory: x.subcategory || '' })) : [];
        const shopping = Array.isArray(parsed.shopping) ? parsed.shopping.map(x => ({ ...x, subcategory: x.subcategory || '' })) : [];
        let taxonomy = Array.isArray(parsed.taxonomy) ? parsed.taxonomy.map(x => ({
          name: normalize(x.name),
          subcategories: Array.isArray(x.subcategories) ? x.subcategories.map(normalize).filter(Boolean) : []
        })).filter(x => x.name) : [];

        if (!taxonomy.length) {
          const map = new Map();
          items.forEach(item => {
            const category = normalize(item.category);
            const subcategory = normalize(item.subcategory);
            if (!category) return;
            if (!map.has(category)) map.set(category, new Set());
            if (subcategory) map.get(category).add(subcategory);
          });
          taxonomy = [...map.entries()].map(([name, subs]) => ({
            name,
            subcategories: [...subs].sort((a,b) => a.localeCompare(b, 'ru'))
          }));
        }

        return { items, shopping, taxonomy };
      } catch (e) {
        return { items: [], shopping: [], taxonomy: [] };
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(app.state));
    }

    async function checkVersionJsonAndRefresh() {
      try {
        const res = await fetch(`version.json?ts=${Date.now()}`, { cache: 'no-store' });
        if (!res.ok) return;
        const data = await res.json();
        const remoteVersion = String(data.version || '').trim();
        if (!remoteVersion) return;

        const url = new URL(window.location.href);
        const currentVersion = url.searchParams.get('v') || '';

        if (currentVersion !== remoteVersion) {
          url.searchParams.set('v', remoteVersion);
          window.location.replace(url.toString());
        }
      } catch (e) {}
    }



    function parseLeadingNumber(value) {
      const text = normalize(value).replace(',', '.');
      const match = text.match(/^\d+(?:\.\d+)?/);
      return match ? Number(match[0]) : null;
    }

    function smartCompare(a, b) {
      const aa = normalize(a);
      const bb = normalize(b);
      const na = parseLeadingNumber(aa);
      const nb = parseLeadingNumber(bb);

      if (na !== null && nb !== null && na !== nb) return na - nb;
      if (na !== null && nb === null) return -1;
      if (na === null && nb !== null) return 1;
      return aa.localeCompare(bb, 'ru', { numeric: true, sensitivity: 'base' });
    }

    function findCategoryEntry(category) {
      const name = normalize(category);
      return app.state.taxonomy.find(x => normalize(x.name) === name) || null;
    }

    function ensureCategory(category) {
      const name = normalize(category);
      if (!name) return null;
      let entry = findCategoryEntry(name);
      if (!entry) {
        entry = { name, subcategories: [] };
        app.state.taxonomy.push(entry);
        app.state.taxonomy.sort((a, b) => smartCompare(a.name, b.name));
      }
      return entry;
    }

    function ensureSubcategory(category, subcategory) {
      const sub = normalize(subcategory);
      const entry = ensureCategory(category);
      if (!entry || !sub) return entry;
      if (!entry.subcategories.some(x => normalize(x) === sub)) {
        entry.subcategories.push(sub);
      }
      return entry;
    }

    function removeCategoryTaxonomy(category) {
      const name = normalize(category);
      app.state.taxonomy = app.state.taxonomy.filter(x => normalize(x.name) !== name);
    }

    function removeSubcategoryTaxonomy(category, subcategory) {
      const cat = findCategoryEntry(category);
      const sub = normalize(subcategory);
      if (!cat) return;
      cat.subcategories = cat.subcategories.filter(x => normalize(x) !== sub);
    }

    function getCategories() {
      return [...new Set(
        app.state.taxonomy.map(x => normalize(x.name)).filter(Boolean)
          .concat(app.state.items.map(x => normalize(x.category)).filter(Boolean))
      )].sort((a,b) => smartCompare(a, b));
    }

    function getSubcategories(category) {
      if (!category || category === 'all') return [];
      const fromTaxonomy = (findCategoryEntry(category)?.subcategories || []).map(normalize).filter(Boolean);
      const fromItems = app.state.items
        .filter(x => normalize(x.category) === category)
        .map(x => normalize(x.subcategory))
        .filter(Boolean);

      const ordered = [];
      const seen = new Set();

      fromTaxonomy.forEach(sub => {
        if (!seen.has(sub)) {
          seen.add(sub);
          ordered.push(sub);
        }
      });

      const missing = [...new Set(fromItems.filter(sub => !seen.has(sub)))].sort((a,b) => smartCompare(a, b));
      return ordered.concat(missing);
    }


    let dragSubcategoryName = null;

    function moveSubcategoryBefore(category, dragSub, targetSub) {
      const entry = findCategoryEntry(category);
      if (!entry) return;
      const subs = getSubcategories(category);
      if (!dragSub || !targetSub || dragSub === targetSub) return;

      const from = subs.findIndex(x => normalize(x) === normalize(dragSub));
      const to = subs.findIndex(x => normalize(x) === normalize(targetSub));
      if (from === -1 || to === -1) return;

      const reordered = [...subs];
      const moved = reordered.splice(from, 1)[0];
      const adjustedTo = from < to ? to - 1 : to;
      reordered.splice(adjustedTo, 0, moved);

      entry.subcategories = reordered;
      saveState();
      render();
    }

    function enableSubcategoryDragAndDrop(category) {
      els.subtabs.querySelectorAll('.subtab[data-subcat]').forEach(btn => {
        if (btn.dataset.subcat === 'all') return;

        btn.setAttribute('draggable', 'true');

        btn.addEventListener('dragstart', () => {
          dragSubcategoryName = btn.dataset.subcat;
          btn.classList.add('dragging');
        });

        btn.addEventListener('dragend', () => {
          btn.classList.remove('dragging');
          els.subtabs.querySelectorAll('.subtab.drag-over').forEach(x => x.classList.remove('drag-over'));
          dragSubcategoryName = null;
        });

        btn.addEventListener('dragover', (e) => {
          e.preventDefault();
          if (!dragSubcategoryName || dragSubcategoryName === btn.dataset.subcat) return;
          btn.classList.add('drag-over');
        });

        btn.addEventListener('dragleave', () => {
          btn.classList.remove('drag-over');
        });

        btn.addEventListener('drop', (e) => {
          e.preventDefault();
          btn.classList.remove('drag-over');
          moveSubcategoryBefore(category, dragSubcategoryName, btn.dataset.subcat);
        });
      });
    }

    function statusFor(item) {
      const qty = Number(item.qty || 0);
      const minQty = Number(item.minQty || 0);
      if (qty <= 0) return { key:'none', text:'НЕТ' };
      if (qty <= minQty) return { key:'buy', text:'КУПИТЬ' };
      if (qty <= minQty * 1.5 && minQty > 0) return { key:'warn', text:'МАЛО' };
      return { key:'ok', text:'НОРМА' };
    }

    function renderStructureManager() {
      const categories = getCategories();
      const options = categories.length
        ? categories.map(cat => `<option value="${escapeHtml(cat)}">${escapeHtml(cat)}</option>`).join('')
        : '<option value="">Нет категорий</option>';
      els.managerParentCategory.innerHTML = options;

      if (!categories.length) {
        els.structureTree.innerHTML = '<div class="empty">Пока нет категорий.</div>';
        return;
      }

      els.structureTree.innerHTML = categories.map(category => {
        const subs = getSubcategories(category);
        return `
          <div class="tree-category">
            <div class="tree-head">
              <div class="tree-name">${escapeHtml(category)}</div>
              <div class="row">
                <button class="secondary" data-rename-cat="${escapeHtml(category)}">Переименовать</button>
                <button class="danger" data-delete-cat="${escapeHtml(category)}">Удалить</button>
              </div>
            </div>
            <div class="tree-subs">
              ${subs.length ? subs.map(sub => `
                <div class="tree-sub">
                  <div>${escapeHtml(sub)}</div>
                  <div class="row">
                    <button class="secondary" data-rename-sub="${escapeHtml(category)}||${escapeHtml(sub)}">Переименовать</button>
                    <button class="danger" data-delete-sub="${escapeHtml(category)}||${escapeHtml(sub)}">Удалить</button>
                  </div>
                </div>
              `).join('') : '<div class="tree-empty">Подкатегорий нет.</div>'}
            </div>
          </div>
        `;
      }).join('');

      els.structureTree.querySelectorAll('[data-rename-cat]').forEach(btn => {
        btn.addEventListener('click', () => renameCategoryPrompt(btn.dataset.renameCat));
      });
      els.structureTree.querySelectorAll('[data-delete-cat]').forEach(btn => {
        btn.addEventListener('click', () => deleteCategoryByName(btn.dataset.deleteCat));
      });
      els.structureTree.querySelectorAll('[data-rename-sub]').forEach(btn => {
        const [category, sub] = btn.dataset.renameSub.split('||');
        btn.addEventListener('click', () => renameSubcategoryByName(category, sub));
      });
      els.structureTree.querySelectorAll('[data-delete-sub]').forEach(btn => {
        const [category, sub] = btn.dataset.deleteSub.split('||');
        btn.addEventListener('click', () => deleteSubcategoryByName(category, sub));
      });
    }

    function renameCategoryPrompt(oldName) {
      const next = prompt('Новое имя категории', oldName);
      const newName = normalize(next);
      if (!newName || newName === oldName) return;

      ensureCategory(newName);

      app.state.items.forEach(item => {
        if (normalize(item.category) === normalize(oldName)) item.category = newName;
      });
      app.state.shopping.forEach(row => {
        if (normalize(row.category) === normalize(oldName)) row.category = newName;
      });

      const oldEntry = findCategoryEntry(oldName);
      const newEntry = findCategoryEntry(newName);
      if (oldEntry && newEntry && normalize(oldName) !== normalize(newName)) {
        oldEntry.subcategories.forEach(sub => ensureSubcategory(newName, sub));
      }
      removeCategoryTaxonomy(oldName);

      if (app.activeCategory === oldName) app.activeCategory = newName;

      saveState();
      render();
      renderStructureManager();
    }

    function deleteCategoryByName(category) {
      const ok = confirm(`Удалить категорию "${category}" и всё внутри неё?`);
      if (!ok) return;

      const ids = new Set(app.state.items.filter(x => normalize(x.category) === normalize(category)).map(x => x.id));
      app.state.items = app.state.items.filter(x => normalize(x.category) !== normalize(category));
      app.state.shopping = app.state.shopping.filter(x => !(ids.has(x.itemId) || normalize(x.category) === normalize(category)));
      removeCategoryTaxonomy(category);

      if (app.activeCategory === category) {
        app.activeCategory = 'all';
        app.activeSubcategory = 'all';
      }

      saveState();
      render();
      renderStructureManager();
    }

    function renameSubcategoryByName(category, oldSub) {
      const next = prompt('Новое имя подкатегории', oldSub);
      const newSub = normalize(next);
      if (!newSub || newSub === oldSub) return;

      app.state.items.forEach(item => {
        if (normalize(item.category) === normalize(category) && normalize(item.subcategory) === normalize(oldSub)) {
          item.subcategory = newSub;
        }
      });
      app.state.shopping.forEach(row => {
        if (normalize(row.category) === normalize(category) && normalize(row.subcategory) === normalize(oldSub)) {
          row.subcategory = newSub;
        }
      });

      removeSubcategoryTaxonomy(category, oldSub);
      ensureSubcategory(category, newSub);

      if (app.activeCategory === category && app.activeSubcategory === oldSub) app.activeSubcategory = newSub;

      saveState();
      render();
      renderStructureManager();
    }

    function deleteSubcategoryByName(category, subcategory) {
      const ok = confirm(`Удалить подкатегорию "${subcategory}" и все позиции внутри неё?`);
      if (!ok) return;

      const ids = new Set(
        app.state.items
          .filter(item => normalize(item.category) === normalize(category) && normalize(item.subcategory) === normalize(subcategory))
          .map(item => item.id)
      );

      app.state.items = app.state.items.filter(item => !(normalize(item.category) === normalize(category) && normalize(item.subcategory) === normalize(subcategory)));
      app.state.shopping = app.state.shopping.filter(row => !(ids.has(row.itemId) || (normalize(row.category) === normalize(category) && normalize(row.subcategory) === normalize(subcategory))));
      removeSubcategoryTaxonomy(category, subcategory);

      if (app.activeCategory === category && app.activeSubcategory === subcategory) app.activeSubcategory = 'all';

      saveState();
      render();
      renderStructureManager();
    }

    function addItem() {

        location: normalize(els.location.value),
        note: normalize(els.note.value),
      });

      els.name.value = '';
      els.subcategory.value = '';
      els.qty.value = '';
      els.minQty.value = '';
      els.location.value = '';
      els.note.value = '';

      render();
    }

    function importJson(event) {
      const file = event.target.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(reader.result);
          if (!Array.isArray(parsed.items)) throw new Error();
          app.state = {
            items: parsed.items.map(x => ({ ...x, subcategory: x.subcategory || '' })),
            shopping: Array.isArray(parsed.shopping) ? parsed.shopping.map(x => ({ ...x, subcategory: x.subcategory || '' })) : [],
            taxonomy: Array.isArray(parsed.taxonomy) ? parsed.taxonomy.map(x => ({
              name: normalize(x.name),
              subcategories: Array.isArray(x.subcategories) ? x.subcategories.map(normalize).filter(Boolean) : []
            })).filter(x => x.name) : [],
          };
          if (!app.state.taxonomy.length) {
            app.state.items.forEach(item => ensureSubcategory(item.category, item.subcategory || ''));
          }
          saveState();
          render();
          alert('Импортировано.');
        } catch (e) {
          alert('Файл битый или не подходит.');
        } finally {
          event.target.value = '';
        }
      };
      reader.readAsText(file, 'utf-8');
    }

    function filteredItems() {
      const q = normalize(els.search.value).toLowerCase();
      return app.state.items.filter(item => {
        const inCategory = app.activeCategory === 'all' ? true : normalize(item.category) === app.activeCategory;
        const inSubcategory = app.activeSubcategory === 'all' ? true : normalize(item.subcategory) === app.activeSubcategory;
        const hay = [item.name, item.category, item.subcategory, item.location, item.note].join(' ').toLowerCase();
        const inSearch = !q || hay.includes(q);
        return inCategory && inSubcategory && inSearch;
      });
    }

    function setQty(id, value) {
      const item = app.state.items.find(x => x.id === id);
      if (!item) return;
      const num = Number(value);
      item.qty = Number.isFinite(num) ? Math.max(0, num) : 0;
      saveState();
      render();
    }

    function changeQty(id, delta) {
      const item = app.state.items.find(x => x.id === id);
      if (!item) return;
      item.qty = Math.max(0, Number(item.qty || 0) + delta);
      saveState();
      render();
    }

      if (!confirm('Удалить позицию?')) return;
      app.state.items = app.state.items.filter(x => x.id !== id);
      app.state.shopping = app.state.shopping.filter(x => x.itemId !== id);
      saveState();
      render();
    }

      if (!app.activeCategory || app.activeCategory === 'all') {
        alert('Сначала выбери конкретную категорию.');
        return;
      }
      const category = app.activeCategory;
      const ok = confirm(`Удалить категорию "${category}" и все позиции внутри неё?`);
      if (!ok) return;

      app.state.shopping = app.state.shopping.filter(x => !(ids.has(x.itemId) || normalize(x.category) === category));
      removeCategoryTaxonomy(category);

      app.activeSubcategory = 'all';
      saveState();

    function saveEditedItem() {
      const item = app.state.items.find(x => x.id === app.editingId);
      if (!item) return;
      const oldCategory = normalize(item.category);
      const oldSubcategory = normalize(item.subcategory);
      const category = normalize(els.editCategory.value);
      const subcategory = normalize(els.editSubcategory.value);
      const name = normalize(els.editName.value);
      if (!category) return alert('Впиши категорию.');
      if (!name) return alert('Впиши название позиции.');

      removeSubcategoryTaxonomy(oldCategory, oldSubcategory);
      ensureSubcategory(category, subcategory);

      item.category = category;
      item.subcategory = subcategory;
      item.name = name;
      item.unit = els.editUnit.value;
      item.qty = Math.max(0, Number(els.editQty.value || 0));
      item.minQty = Math.max(0, Number(els.editMinQty.value || 0));
      item.location = normalize(els.editLocation.value);
      item.note = normalize(els.editNote.value);

      app.state.shopping.forEach(row => {
        if (row.itemId === item.id) {
          row.category = item.category;
          row.subcategory = item.subcategory || '';
          row.name = item.name;
          row.note = item.note || '';
        }
      });

      if (app.activeCategory === oldCategory && oldCategory !== category) app.activeCategory = category;
      if (app.activeSubcategory === oldSubcategory && oldSubcategory !== subcategory) app.activeSubcategory = subcategory || 'all';

      saveState();
      closeEditModal();
      render();
    }

    function addProblemToShopping() {
      const need = app.state.items.filter(item => {
        const s = statusFor(item);
        return s.key === 'buy' || s.key === 'none';
      });

      need.forEach(item => {
        if (!app.state.shopping.some(x => x.itemId === item.id)) {
          const deficit = Math.max(0, Number(item.minQty || 0) - Number(item.qty || 0));
          app.state.shopping.push({
            id: uid(),
            itemId: item.id,
            category: item.category,
            subcategory: item.subcategory || '',
            name: item.name,
            unit: item.unit || 'шт',
            buyQty: deficit > 0 ? deficit : '',
            note: item.note || ''
          });
        }
      });

      saveState();
      render();
    }

    function updateShoppingItem(id, patch) {
      const row = app.state.shopping.find(x => x.id === id);
      if (!row) return;
      Object.assign(row, patch);
      saveState();
      renderShopping();

    let dragItemId = null;

    function moveItemBefore(dragId, targetId) {
      if (!dragId || !targetId || dragId === targetId) return;
      const visible = filteredItems().map(x => x.id);
      const fromVisible = visible.indexOf(dragId);
      const toVisible = visible.indexOf(targetId);
      if (fromVisible === -1 || toVisible === -1) return;

      const newVisible = [...visible];
      const movedId = newVisible.splice(fromVisible, 1)[0];
      const adjusted = fromVisible < toVisible ? toVisible - 1 : toVisible;
      newVisible.splice(adjusted, 0, movedId);

      const visibleSet = new Set(visible);
      const newItems = [];
      let visiblePtr = 0;
      for (const oldItem of app.state.items) {
        if (visibleSet.has(oldItem.id)) {
          const newId = newVisible[visiblePtr++];
          newItems.push(app.state.items.find(x => x.id === newId));
        } else {
          newItems.push(oldItem);
        }
      }
      app.state.items = newItems;
      saveState();
      render();
    }

    function enableDragAndDrop() {
      els.items.querySelectorAll('.item[data-id]').forEach(card => {
        card.addEventListener('dragstart', () => {
          dragItemId = card.dataset.id;
          card.classList.add('dragging');
        });
        card.addEventListener('dragend', () => {
          card.classList.remove('dragging');
          els.items.querySelectorAll('.item.drag-over').forEach(x => x.classList.remove('drag-over'));
          dragItemId = null;
        });
        card.addEventListener('dragover', (e) => {
          e.preventDefault();
          if (!dragItemId || dragItemId === card.dataset.id) return;
          card.classList.add('drag-over');
        });
        card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
        card.addEventListener('drop', (e) => {
          e.preventDefault();
          card.classList.remove('drag-over');
          moveItemBefore(dragItemId, card.dataset.id);
        });
      });
    }

    els.confirmPrintBtn.addEventListener('click', () => window.print());

    els.name.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });
    els.category.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

    setTimeout(checkVersionJsonAndRefresh, 1200);
    window.addEventListener('focus', checkVersionJsonAndRefresh);
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') checkVersionJsonAndRefresh();
    });

    render();
  </script>
</body>
</html>
